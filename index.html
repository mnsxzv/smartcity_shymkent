<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Мониторинга Шымкента</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #sidebar {
            width: 400px;
            background-color: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            box-shadow: 4px 0 25px rgba(0,0,0,0.5);
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid #334155;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
        }

        #list-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #list-container::-webkit-scrollbar {
            width: 6px;
        }
        #list-container::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 3px;
        }

        .issue-card {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .issue-card:hover {
            border-color: #a855f7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .category-tag {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            background-color: #334155;
            color: #94a3b8;
        }

        .issue-card[data-cat="Освещение"] .category-tag { background-color: rgba(234, 179, 8, 0.15); color: #eab308; }
        .issue-card[data-cat="Дороги"] .category-tag { background-color: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .issue-card[data-cat="Мусор"] .category-tag { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .issue-card[data-cat="ЖКХ"] .category-tag { background-color: rgba(16, 185, 129, 0.15); color: #10b77f; }
        .issue-card[data-cat="Благоустройство"] .category-tag { background-color: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .radius-tag {
            font-size: 11px;
            color: #38bdf8;
            font-weight: 600;
            background-color: rgba(56, 189, 248, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .card-text {
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .card-address {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer {
            padding: 16px;
            border-top: 1px solid #334155;
            background-color: #0f172a;
        }

        .clear-btn {
            width: 100%;
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .clear-btn:hover {
            background-color: #ef4444;
            color: #ffffff;
        }

        #map-container {
            flex: 1;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-popup-content-wrapper {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border: 1px solid #334155;
            border-radius: 12px !important;
            padding: 4px;
        }

        .leaflet-popup-tip {
            background-color: #1e293b !important;
            border: 1px solid #334155;
        }

        .no-data {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Ситуационный Центр</h1>
            <p>Мониторинг инцидентов Шымкента</p>
        </div>
        
        <div id="list-container">
            </div>
        
        <div class="footer">
            <button class="clear-btn" onclick="clearMap()">Очистить карту</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Координаты центра Шымкента для инициализации карты
        const map = L.map('map', { zoomControl: false }).setView([42.3417, 69.5901], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Стильная темная тема карты (Картографическая подложка CartoDB)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // Массив для хранения всех активных слоев (чтобы стирать их при очистке)
        let mapLayers = [];

        // Ссылка на твой бэкенд (локальный или ngrok)
        const API_URL = 'http://localhost:5000';

        async function fetchIssues() {
            try {
                const response = await fetch(`${API_URL}/api/issues`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const issues = await response.json();
                
                // Стираем всё старое с карты и панели
                mapLayers.forEach(layer => map.removeLayer(layer));
                mapLayers = [];
                
                const listContainer = document.getElementById('list-container');
                listContainer.innerHTML = '';

                if (issues.length === 0) {
                    listContainer.innerHTML = '<div class="no-data">Ячеек с инцидентами пока нет.<br>Отправьте сообщение боту!</div>';
                    return;
                }

                // Разворачиваем массив, чтобы новые инциденты шли сверху
                issues.reverse().forEach(issue => {
                    let lat = parseFloat(issue.lat);
                    let lng = parseFloat(issue.lng);
                    let radius = parseFloat(issue.radius) || 100;

                    // Страховка от пустых или сломанных координат
                    if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) {
                        lat = 42.3417 + (Math.random() - 0.5) * 0.02;
                        lng = 69.5901 + (Math.random() - 0.5) * 0.02;
                    }

                    // Содержимое всплывающего попапа
                    const popupContent = `
                        <div style="padding: 4px;">
                            <b style="color: #38bdf8; font-size:14px; display:block; margin-bottom:4px;">${issue.category}</b>
                            <span style="font-size: 13px; color:#e2e8f0; display:block; margin-bottom:6px; line-height:1.4;">${issue.text}</span>
                            <small style="color: #94a3b8; display:block; margin-bottom:2px;">📍 ${issue.address}</small>
                            <small style="color: #a855f7; font-weight:600;">⭕️ Зона: ~${parseInt(radius)}м</small>
                        </div>
                    `;

                    // 1. Создаем точечный маркер
                    const marker = L.marker([lat, lng]).addTo(map);
                    marker.bindPopup(popupContent);
                    mapLayers.push(marker);
                    
                    // 2. Рисуем ту самую неоновую буферную зону
                    const circle = L.circle([lat, lng], {
                        color: '#a855f7',       
                        fillColor: '#38bdf8',   
                        fillOpacity: 0.15,      
                        weight: 1.5,
                        radius: radius          
                    }).addTo(map);
                    circle.bindPopup(popupContent);
                    mapLayers.push(circle);

                    // 3. Собираем карточку для левого сайдбара
                    const card = document.createElement('div');
                    card.className = 'issue-card';
                    card.setAttribute('data-cat', issue.category);
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="category-tag">${issue.category}</span>
                            <span class="radius-tag">± ${parseInt(radius)}м</span>
                        </div>
                        <div class="card-text">${issue.text}</div>
                        <div class="card-address">📍 ${issue.address}</div>
                    `;

                    // При клике на карточку летим к зоне
                    card.addEventListener('click', () => {
                        // Если зона огромная (микрорайон), держим камеру повыше (zoom 14), если мелкий дом — приближаем в упор (zoom 16)
                        const targetZoom = radius > 600 ? 14 : 16;
                        map.flyTo([lat, lng], targetZoom, {
                            animate: true,
                            duration: 1.2
                        });
                        
                        // Открываем попап маркера сразу после окончания плавного полета камеры
                        map.once('moveend', () => {
                            marker.openPopup();
                        });
                    });

                    listContainer.appendChild(card);
                });

            } catch (error) {
                console.error("Ошибка обновления данных:", error);
            }
        }

        async function clearMap() {
            if (!confirm("Вы уверены, что хотите очистить всю карту инцидентов?")) return;
            
            try {
                const response = await fetch(`${API_URL}/api/issues/clear`, { method: 'POST' });
                if (response.ok) {
                    fetchIssues();
                }
            } catch (error) {
                console.error("Ошибка при очистке:", error);
            }
        }

        // Автоматическое обновление данных каждые 4 секунды, чтобы новые маркеры прилетали на карту без перезагрузки страницы
        fetchIssues();
        setInterval(fetchIssues, 4000);
    </script>
</body>
</html>
