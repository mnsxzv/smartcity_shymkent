<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Shymkent — ИИ Мониторинг</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.5s ease;
        }
        .status-online {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }
        .status-offline {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 25px;
            gap: 25px;
            height: calc(100vh - 75px);
        }

        .sidebar {
            flex: 1;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .sidebar h2 { font-size: 18px; color: #94a3b8; font-weight: 600; }
        
        .issues-list { 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            flex: 1; 
            padding-right: 5px; 
        }
        .issues-list::-webkit-scrollbar { width: 6px; }
        .issues-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .issue-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
            cursor: pointer; /* Делаем курсор в виде руки, чтобы было понятно, что можно кликнуть */
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .issue-card:hover { 
            background: rgba(255, 255, 255, 0.07); 
            border-color: rgba(56, 189, 248, 0.5); 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.1);
        }
        
        .category-tag { font-size: 11px; text-transform: uppercase; font-weight: 700; color: #38bdf8; }
        .card-text { font-size: 14px; color: #cbd5e1; line-height: 1.4; margin-bottom: 10px; margin-top: 5px; }
        .card-address { font-size: 12px; color: #64748b; }

        .map-wrapper {
            flex: 2;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        #map { width: 100%; height: 100%; border-radius: 16px; background: #111827; }
        
        .leaflet-popup-content-wrapper { background: #1e1b4b !important; color: #f8fafc !important; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .leaflet-popup-tip { background: #1e1b4b !important; }
    </style>
</head>
<body>

    <header>
        <h1>Smart City Shymkent</h1>
        <div id="statusBadge" class="status-badge status-offline">Проверка связи...</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h2>Новые инциденты</h2>
            <div class="issues-list" id="issuesList"></div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([42.3417, 69.5901], 12);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const displayedIssues = new Set();
        const statusBadge = document.getElementById('statusBadge');

        async function fetchIssues() {
            try {
                const response = await fetch('http://localhost:5000/api/issues');
                if (!response.ok) throw new Error('Ошибка сервера бэкенда');
                
                const issues = await response.json();
                
                statusBadge.textContent = "ИИ-Аналитика Live";
                statusBadge.className = "status-badge status-online";

                const listContainer = document.getElementById('issuesList');
                
                issues.forEach(issue => {
                    if (!displayedIssues.has(issue.id)) {
                        displayedIssues.add(issue.id);

                        let lat = parseFloat(issue.lat);
                        let lng = parseFloat(issue.lng);

                        // Страховка координат
                        if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) {
                            lat = 42.3417 + (Math.random() - 0.5) * 0.02;
                            lng = 69.5901 + (Math.random() - 0.5) * 0.02;
                        }

                        // 1. Создаем карточку инцидента
                        const card = document.createElement('div');
                        card.className = 'issue-card';
                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between;">
                                <span class="category-tag">${issue.category}</span>
                            </div>
                            <div class="card-text">${issue.text}</div>
                            <div class="card-address">📍 ${issue.address}</div>
                        `;

                        // Добавляем обработчик клика по карточке для идеального центрирования
card.addEventListener('click', () => {
    // flyTo делает красивый полет камеры и жестко ставит точку в самый ЦЕНТР экрана
    map.flyTo([lat, lng], 16, {
        animate: true,
        duration: 1.5 // Плавный полет за 1.5 секунды
    });
    
    // Ждем, пока камера долетит до центра, и только потом красиво открываем поп-ап
    map.once('moveend', () => {
        marker.openPopup();
    });
});

                        listContainer.insertBefore(card, listContainer.firstChild);

                        // 2. Создаем маркер на карте
                        const marker = L.marker([lat, lng]).addTo(map);
                        marker.bindPopup(`
                            <b style="color: #38bdf8; font-size:14px;">${issue.category}</b><br>
                            <span style="font-size: 13px; display:inline-block; margin: 4px 0;">${issue.text}</span><br>
                            <small style="color: #94a3b8;">Адрес: ${issue.address}</small>
                        `);
                    }
                });
            } catch (error) {
                console.error('Ошибка связи с API бэкенда:', error);
                statusBadge.textContent = "Нет связи с Бэкендом (Запусти main.py)";
                statusBadge.className = "status-badge status-offline";
            }
        }

        fetchIssues();
        setInterval(fetchIssues, 3000);
    </script>
</body>
</html>
