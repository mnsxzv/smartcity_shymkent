<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Shymkent — Ситуационный центр ИИ</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-purple: #a855f7;
            --accent-blue: #38bdf8;
            --live-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Шапка сайта */
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Пульсирующий LIVE индикатор */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            color: var(--live-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--live-green);
            border-radius: 50%;
            margin-right: 8px;
            position: relative;
        }

        .pulse-dot::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--live-green);
            border-radius: 50%;
            animation: pulse 1.8s infinite ease-in-out;
            top: 0;
            left: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* Главный контейнер */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Карта занимает все основное пространство */
        .map-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Боковая панель (Сайдбар) */
        .sidebar {
            width: 380px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 99;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Скролл-лента инцидентов */
        .issues-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* Дизайн карточки проблемы */
        .issue-card {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .issue-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            background-color: rgba(15, 23, 42, 0.8);
        }

        .category-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 6px;
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--accent-blue);
            margin-bottom: 10px;
        }

        .card-text {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .card-address {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        /* Темная тема для попапов карты Leaflet */
        .leaflet-popup-content-wrapper {
            background: var(--panel-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }
        .leaflet-popup-tip {
            background: var(--panel-bg) !important;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body { overflow: hidden; }
            header { padding: 12px 15px; }
            h1 { font-size: 16px; }
            .status-indicator { padding: 4px 10px; font-size: 9px; }
            
            .main-container { 
                flex-direction: column; 
                height: calc(100vh - 55px); 
            }
            
            .map-wrapper { 
                order: 1; 
                flex: none; 
                height: 40vh; 
            }
            
            .sidebar { 
                order: 2; 
                flex: 1; 
                width: 100%; 
                border-left: none;
                border-top: 1px solid var(--border-color);
                overflow: hidden;
            }

            .issues-list {
                max-height: calc(60vh - 55px);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Smart City Shymkent</h1>
        <div class="status-indicator">
            <span class="pulse-dot"></span>
            <span class="status-text">ИИ-Аналитика • Подключение...</span>
        </div>
    </header>

    <div class="main-container">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Лента городских инцидентов</div>
            </div>
            <div class="issues-list" id="issues-container">
                </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // === ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ИЗ NGROK ИЛИ SSH LOCALHOST.RUN ===
        const API_URL = 'https://clatter-choosy-foam.ngrok-free.dev/api/issues'; 

        // Инициализация карты с фокусом на центр Шымкента
        const map = L.map('map').setView([42.3417, 69.5901], 13);

        // Подключаем стильную темную карту, чтобы неоновые маркеры горели красиво
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        async function loadIssues() {
            const listContainer = document.getElementById('issues-container');
            const statusText = document.querySelector('.status-text');
            const pulseDot = document.querySelector('.pulse-dot');
            const statusContainer = document.querySelector('.status-indicator');

            try {
                const response = await fetch(API_URL, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const issues = await response.json();

                // Обновляем статус: бэкенд ответил, всё работает!
                if (statusText) {
                    statusText.innerText = 'ИИ-Аналитика LIVE • Подключен';
                    statusContainer.style.background = 'rgba(16, 185, 129, 0.1)';
                    statusContainer.style.borderColor = 'rgba(16, 185, 129, 0.25)';
                    statusText.style.color = '#10b981';
                    pulseDot.style.backgroundColor = '#10b981';
                }

                listContainer.innerHTML = '';

                if (issues.length === 0) {
                    listContainer.innerHTML = '<div style="color: #64748b; text-align: center; margin-top: 20px; font-size: 13px;">Ждем новых сообщений от жителей...</div>';
                    return;
                }

                issues.forEach(issue => {
                    let lat = parseFloat(issue.lat);
                    let lng = parseFloat(issue.lng);
                    let radius = parseFloat(issue.radius) || 100;

                    if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) {
                        lat = 42.3417;
                        lng = 69.5901;
                    }

                    // 1. Создаем стандартный маркер
                    const marker = L.marker([lat, lng]).addTo(map);

                    // 2. Рисуем красивую буферную зону (круг погрешности) вокруг маркера
                    const circle = L.circle([lat, lng], {
                        color: '#a855f7',       
                        fillColor: '#38bdf8',   
                        fillOpacity: 0.15,      
                        radius: radius          
                    }).addTo(map);

                    // Наполнение всплывающего окна
                    const popupContent = `
                        <b style="color: #38bdf8; font-size:14px;">${issue.category}</b><br>
                        <span style="font-size: 13px; display:inline-block; margin: 4px 0; color:#f8fafc;">${issue.text}</span><br>
                        <small style="color: #94a3b8; display:block; margin-top:2px;">📍 ${issue.address}</small>
                        <small style="color: #a855f7; font-weight:600;">⭕️ Зона охвата: ~${parseInt(radius)}м</small>
                    `;

                    marker.bindPopup(popupContent);
                    circle.bindPopup(popupContent);

                    // Создаем карточку инцидента для сайдбара
                    const card = document.createElement('div');
                    card.className = 'issue-card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="category-tag">${issue.category}</span>
                            <span style="font-size: 10px; color: #a855f7; font-weight:600; text-transform: uppercase;">± ${parseInt(radius)}м</span>
                        </div>
                        <div class="card-text">${issue.text}</div>
                        <div class="card-address">📍 ${issue.address}</div>
                    `;

                    // При клике на карточку плавно летим к кругу на карте
                    card.addEventListener('click', () => {
                        map.flyTo([lat, lng], radius > 500 ? 14 : 16, {
                            animate: true,
                            duration: 1.2
                        });
                        map.once('moveend', () => {
                            marker.openPopup();
                        });
                    });

                    // Добавляем новые карточки в самый верх ленты
                    listContainer.insertBefore(card, listContainer.firstChild);
                });

            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                // Если сервак упал или ngrok ссылка сдохла — интерфейс сразу станет красным
                if (statusText && pulseDot) {
                    statusText.innerText = 'ИИ-Аналитика • Офлайн';
                    statusContainer.style.background = 'rgba(239, 68, 68, 0.1)';
                    statusContainer.style.borderColor = 'rgba(239, 68, 68, 0.25)';
                    statusText.style.color = '#ef4444';
                    pulseDot.style.backgroundColor = '#ef4444';
                }
            }
        }

        // Загружаем данные при открытии страницы
        loadIssues();

        // Автоматически обновляем карту каждые 5 секунд (Real-time эффект для демонстрации)
        setInterval(loadIssues, 5000);
    </script>
</body>
</html>
