<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart City Shymkent — ИИ Мониторинг</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%); color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px 25px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        h1 { font-size: 20px; font-weight: 700; background: linear-gradient(to right, #38bdf8, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; transition: all 0.5s ease; white-space: nowrap; }
        .status-online { background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #4ade80; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .status-offline { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; height: calc(100vh - 65px); }
        .sidebar { flex: 1; max-width: 400px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .sidebar h2 { font-size: 16px; color: #94a3b8; font-weight: 600; }
        .issues-list { overflow-y: auto; display: flex; flex-direction: column; gap: 12px; flex: 1; padding-right: 5px; }
        .issues-list::-webkit-scrollbar { width: 4px; }
        .issues-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .issue-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 14px; transition: all 0.3s ease; animation: fadeIn 0.5s ease-out; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .issue-card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(56, 189, 248, 0.4); transform: translateY(-2px); }
        .category-tag { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #38bdf8; }
        .card-text { font-size: 13px; color: #cbd5e1; line-height: 1.4; margin-bottom: 6px; margin-top: 4px; }
        .card-address { font-size: 11px; color: #64748b; }

        .map-wrapper { flex: 2; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 8px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); z-index: 1; }
        #map { width: 100%; height: 100%; border-radius: 16px; background: #111827; }
        .leaflet-popup-content-wrapper { background: #1e1b4b !important; color: #f8fafc !important; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .leaflet-popup-tip { background: #1e1b4b !important; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body { overflow: hidden; }
            header { padding: 12px 15px; }
            h1 { font-size: 18px; }
            .main-container { flex-direction: column; padding: 12px; gap: 12px; height: calc(100vh - 55px); }
            .map-wrapper { order: 1; flex: none; height: 40vh; border-radius: 18px; }
            .sidebar { order: 2; flex: 1; max-width: 100%; border-radius: 18px; padding: 15px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Smart City Shymkent</h1>
        <div id="statusBadge" class="status-badge status-offline">Нет связи</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h2>Новые инциденты</h2>
            <div class="issues-list" id="issuesList"></div>
        </div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Проверка ширины экрана
        const isMobile = window.innerWidth <= 768;

        // Инициализация карты
        const map = L.map('map', {
            zoomControl: !isMobile // Отключаем кнопки зума на мобилках
        }).setView([42.3417, 69.5901], 12);

        // Темная тема карты
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const displayedIssues = new Set();
        const statusBadge = document.getElementById('statusBadge');
        const listContainer = document.getElementById('issuesList');

        async function fetchIssues() {
            try {
               
const response = await fetch('https://a1b2-c3d4-e5f6.ngrok-free.app/api/issues');
                if (!response.ok) throw new Error('Ошибка сервера');
                
                const issues = await response.json();
                
                statusBadge.textContent = "ИИ-Аналитика Live";
                statusBadge.className = "status-badge status-online";

                issues.forEach(issue => {
                    if (!displayedIssues.has(issue.id)) {
                        displayedIssues.add(issue.id);

                        let lat = parseFloat(issue.lat);
                        let lng = parseFloat(issue.lng);

                        if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) {
                            lat = 42.3417 + (Math.random() - 0.5) * 0.02;
                            lng = 69.5901 + (Math.random() - 0.5) * 0.02;
                        }

                        // Создание карточки
                        const card = document.createElement('div');
                        card.className = 'issue-card';
                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between;">
                                <span class="category-tag">${issue.category}</span>
                            </div>
                            <div class="card-text">${issue.text}</div>
                            <div class="card-address">📍 ${issue.address}</div>
                        `;

                        // Создание маркера
                        const marker = L.marker([lat, lng]).addTo(map);
                        marker.bindPopup(`
                            <b style="color: #38bdf8; font-size:14px;">${issue.category}</b><br>
                            <span style="font-size: 13px; display:inline-block; margin: 4px 0;">${issue.text}</span><br>
                            <small style="color: #94a3b8;">Адрес: ${issue.address}</small>
                        `);

                        // Обработчик клика (flyTo)
                        card.addEventListener('click', () => {
                            map.flyTo([lat, lng], 16, { animate: true, duration: 1.5 });
                            map.once('moveend', () => { marker.openPopup(); });
                        });

                        listContainer.insertBefore(card, listContainer.firstChild);
                    }
                });
            } catch (error) {
                console.error('Ошибка связи:', error);
                statusBadge.textContent = "Нет связи";
                statusBadge.className = "status-badge status-offline";
            }
        }

        // Запуск
        fetchIssues();
        setInterval(fetchIssues, 4000); // Опрос каждые 4 секунды (чуть реже для стабильности)

        // Исправление бага Leaflet при изменении размера окна
        window.addEventListener('resize', () => { map.invalidateSize(); });
    </script>
</body>
</html>
